<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="calculator">
    <div class="calc-header">
      <div class="brand">Calculator</div>
      <div class="calc-indicator"></div>
    </div>
    <input type="text" id="display" readonly>
    <div class="buttons" id="buttons">
      <button class="btn-clear" onclick="clearDisplay()">C</button>
      <button class="btn-op" onclick="appendValue('/')">÷</button>
      <button class="btn-op" onclick="appendValue('*')">×</button>
      <button class="btn-op" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="btn-op" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="btn-eq" onclick="calculate()">=</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="btn-zero" onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
    </div>
  </div>
  <script src="./javascript.js"></script>
</body>
</html>
